workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update || pod install
          cd ..

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r JARVIS_Remote.ipa Payload
          cd ../../..
          cp build/ios/iphoneos/JARVIS_Remote.ipa .
    artifacts:
      - JARVIS_Remote.ipaworkflows:
