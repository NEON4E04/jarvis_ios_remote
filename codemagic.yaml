workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Configure Git for China/RU mirrors
        script: |
          git config --global url."https://gitclone.com/github.com/".insteadOf "https://github.com/"
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: Install CocoaPods with retry
        script: |
          cd ios
          pod repo remove master || true
          pod repo add master https://cdn.cocoapods.org/
          pod install --verbose || pod install --verbose --repo-update
          cd ..

      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r JARVIS_Remote.ipa Payload
    artifacts:
      - build/ios/iphoneos/JARVIS_Remote.ipa