workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean project
        script: |
          flutter clean
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          cd ..

      - name: Install dependencies
        script: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign

      - name: Create IPA file
        script: |
          # Переходим в папку со сборкой
          cd build/ios/iphoneos
          
          # Создаем папку Payload и копируем приложение
          mkdir Payload
          cp -R Runner.app Payload/
          
          # Создаем IPA (это просто zip с расширением .ipa)
          zip -r JARVIS.ipa Payload/
          
          # Копируем в корневую папку проекта
          cp JARVIS.ipa ../../../../
          
          echo "✅ IPA файл создан: JARVIS.ipa"

    artifacts:
      - JARVIS.ipa