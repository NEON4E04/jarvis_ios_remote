workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -f ios/Podfile.lock
          rm -rf ios/Pods

      - name: Get dependencies
        script: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          # Собираем приложение
          flutter build ios --release --no-codesign
          
          # Создаем правильную структуру IPA
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          
          # Создаем IPA файл
          zip -r JARVIS_Remote.ipa Payload
          
          # Копируем в корень для артефактов
          cp JARVIS_Remote.ipa ../../../
          cd ../../../

    artifacts:
      - JARVIS_Remote.ipa